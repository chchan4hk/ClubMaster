<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coach Manager — Sport Court Booking</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body
  class="dashboard-dynamic-bg min-h-screen text-slate-100 p-6"
  style="--dashboard-bg-img: url('Source/Image/coach-manager.jpg');">
  <div class="dynamic-bg-stack" aria-hidden="true">
    <div class="dynamic-bg-photo"></div>
    <div class="dynamic-bg-overlay"></div>
    <canvas class="dynamic-bg-star-net"></canvas>
    <div class="dynamic-bg-spot-glow"></div>
  </div>
  <header class="max-w-6xl mx-auto mb-6">
    <div class="flex flex-wrap justify-between items-start gap-4 mb-4">
      <div>
        <h1 class="text-2xl font-bold text-amber-300">Coach Manager</h1>
        <p id="welcome" class="text-slate-400 text-sm mt-1">Loading…</p>
      </div>
      <button type="button" id="logoutBtn"
        class="rounded-lg bg-slate-800 border border-slate-600 px-4 py-2 text-sm hover:bg-slate-700 shrink-0">
        Sign out
      </button>
    </div>
    <nav
      class="flex flex-nowrap items-center gap-2 overflow-x-auto glass rounded-xl border border-white/15 p-2"
      aria-label="Dashboard sections">
      <button type="button" id="navOverview"
        class="shrink-0 whitespace-nowrap rounded-lg px-4 py-2.5 text-sm font-medium text-slate-100 hover:bg-white/10 transition-colors focus:outline-none focus:ring-2 focus:ring-amber-500/50">
        Overview
      </button>
      <button type="button" id="navProfile"
        class="shrink-0 whitespace-nowrap rounded-lg px-4 py-2.5 text-sm font-medium text-slate-100 hover:bg-white/10 transition-colors focus:outline-none focus:ring-2 focus:ring-amber-500/50">
        My Profile
      </button>
      <button type="button" id="navSettings"
        class="shrink-0 whitespace-nowrap rounded-lg px-4 py-2.5 text-sm font-medium text-slate-100 hover:bg-white/10 transition-colors focus:outline-none focus:ring-2 focus:ring-amber-500/50">
        Password Setting
      </button>
    </nav>
  </header>

  <main class="max-w-6xl mx-auto">
    <div>
      <div id="panelOverview" class="glass rounded-xl border border-amber-500/20 p-6">
        <h2 class="text-lg font-semibold text-amber-300 mb-4">Overview</h2>
        <div
          class="relative w-full rounded-lg overflow-hidden border border-white/10 shadow-lg bg-slate-900/40"
          aria-label="Coach manager shortcuts">
          <img src="Source/Image/coach-manager.jpg" alt=""
            class="w-full h-auto max-w-full block pointer-events-none select-none"
            loading="lazy" />
          <!-- 3×3 tile links; percentages match coach-manager.jpg (2400×1416), HKIT_Dashboard-style hotspots -->
          <a class="cm-hotspot" href="#" data-dashboard-iframe="backend/coach_manager_modules/club_master/club-master.html" title="Club Master"
            style="left: 2.5%; top: 3.5%; width: 29.5%; height: 28.5%;" aria-label="Club Master"></a>
          <a class="cm-hotspot" href="#" data-dashboard-iframe="backend/coach_manager_modules/coach_information/coach-information.html" title="Coach Information"
            style="left: 34%; top: 3.5%; width: 29.5%; height: 28.5%;" aria-label="Coach Information"></a>
          <a class="cm-hotspot" href="#" data-dashboard-iframe="backend/student_modules/student_information/student-information.html" title="Student Information"
            style="left: 65.5%; top: 3.5%; width: 32.5%; height: 28.5%;" aria-label="Student Information"></a>
          <a class="cm-hotspot" href="#" data-dashboard-iframe="backend/lesson_modules/lesson_reservation/lesson-reservation.html" title="Lesson Reservation"
            style="left: 2.5%; top: 34.5%; width: 32.5%; height: 28.5%;" aria-label="Lesson Reservation"></a>
          <a class="cm-hotspot" href="#" data-dashboard-iframe="backend/payment_modules/lesson_payment_status/lesson-payment-status.html" title="Lesson Payment Status"
            style="left: 34%; top: 34.5%; width: 32.5%; height: 28.5%;" aria-label="Prize List"></a>
          <a class="cm-hotspot" href="#" data-dashboard-iframe=""backend/prize_modules/prize_list/prize-list.html" title="Prize List"
            style="left: 65.5%; top: 34.5%; width: 32.5%; height: 28.5%;" aria-label="Lesson Payment Status"></a>
          <a class="cm-hotspot" href="#" data-dashboard-iframe="backend/coach_manager_modules/coach_salary/coach_salary.html" title="Coach Salary"
            style="left: 2.5%; top: 65.5%; width: 33%; height: 28.5%;" aria-label="Coach Salary"></a>
          <a class="cm-hotspot" href="coming_soon.html?m=revenue" title="Revenue"
            style="left: 34%; top: 65.5%; width: 33%; height: 28.5%;" aria-label="Revenue"></a>
          <a class="cm-hotspot" href="coming_soon.html?m=upcoming-events" title="Upcoming Events"
            style="left: 65.5%; top: 65.5%; width: 33%; height: 28.5%;" aria-label="Upcoming Events"></a>
        </div>
      </div>
      <iframe id="panelFrame" title="Dashboard panel"
        class="hidden w-full h-[min(560px,72vh)] rounded-xl border border-white/15 bg-slate-900/50"></iframe>
    </div>
  </main>

  <script src="js/dashboard-dynamic-bg.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard-common.js"></script>
  <script src="js/dashboard-layout.js"></script>
  <script src="js/coach-manager.js"></script>
</body>
</html>
