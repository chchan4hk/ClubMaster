<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Bookings — Student</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body
  class="dashboard-dynamic-bg min-h-screen text-slate-100 p-6"
  style="--dashboard-bg-img: url('/source/image/student.webp');">
  <div class="dynamic-bg-stack" aria-hidden="true">
    <div class="dynamic-bg-photo"></div>
    <div class="dynamic-bg-overlay"></div>
    <canvas class="dynamic-bg-star-net"></canvas>
    <div class="dynamic-bg-spot-glow"></div>
  </div>

  <div class="max-w-6xl mx-auto">
    <header class="mb-6">
      <p id="backLinkWrap">
        <a id="backTopLink" href="/student.html" target="_top"
          class="text-sm text-amber-400/90 hover:text-amber-300 underline-offset-2 hover:underline">
          ← Back to Student
        </a>
      </p>
      <h1 class="text-2xl font-bold text-amber-300 mt-2">My Bookings</h1>
    </header>

    <section class="glass rounded-xl border border-white/15 p-4 mb-6 overflow-x-auto">
      <h2 class="text-lg font-semibold text-amber-200 mb-1">Your lessons</h2>
      <p class="text-xs text-slate-500 mb-3">
        Showing lessons associated with your bookings (same read-only list style as Coach My Bookings). Data: ACTIVE rows in <code class="text-slate-400">LessonReserveList.json</code> for your Student ID, merged with <code class="text-slate-400">LessonList.json</code>.
      </p>
      <p id="fullLessonListError" class="hidden text-sm text-red-300 mb-2"></p>
      <p id="fullLessonListWarn" class="hidden text-sm text-amber-200/90 mb-2"></p>
      <table class="w-full text-sm text-left border-collapse min-w-max">
        <thead>
          <tr id="fullLessonListHeadRow" class="border-b border-white/10 text-slate-400">
            <th class="py-2 pr-3 font-medium">…</th>
          </tr>
        </thead>
        <tbody id="fullLessonListBody">
          <tr><td class="py-4 text-slate-500">Loading…</td></tr>
        </tbody>
      </table>

      <div class="mt-4 flex flex-wrap gap-2">
        <button type="button" id="btnLessonTimetable"
          class="rounded-lg bg-yellow-100 hover:bg-yellow-200/90 border border-yellow-200 text-slate-800 font-medium px-4 py-2 text-sm shadow-sm">
          Lesson TimeTable
        </button>
      </div>
    </section>
  </div>

  <script src="/js/dashboard-dynamic-bg.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    (function () {
      var isFramed = false;
      try {
        isFramed = window.self !== window.top;
      } catch (e) {
        isFramed = true;
      }

      if (isFramed) {
        var bw = document.getElementById("backLinkWrap");
        if (bw) {
          bw.classList.add("hidden");
        }
      }

      if (!isFramed) {
        if (!window.auth.guardPage("Student")) {
          return;
        }
      }

      function setUidLabels(uid) {
        var u = uid && String(uid).trim() ? String(uid).trim() : "…";
        document.querySelectorAll(".hdrUidInline").forEach(function (n) {
          n.textContent = u;
        });
      }

      (function primeClubIdFromUrlOrCache() {
        var q = new URLSearchParams(window.location.search || "");
        var id = (q.get("clubId") || q.get("uid") || "").trim();
        var ctx =
          window.api &&
          window.api.getClubFolderContext &&
          window.api.getClubFolderContext();
        if (ctx && ctx.clubId) {
          id = id || String(ctx.clubId).trim();
        }
        if (id) {
          setUidLabels(id);
        }
      })();

      function getLessonModuleClubId() {
        var q = new URLSearchParams(window.location.search || "");
        var id = (q.get("clubId") || q.get("uid") || "").trim();
        var ctx =
          window.api &&
          window.api.getClubFolderContext &&
          window.api.getClubFolderContext();
        if (ctx && ctx.clubId) {
          id = id || String(ctx.clubId).trim();
        }
        return id;
      }

      function escapeHtml(s) {
        if (s == null) {
          return "";
        }
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      /** Same field keys as Coach My Bookings read-only table, restricted to requested columns. */
      var BOOKING_TABLE_COLS = [
        { key: "Year", label: "Year" },
        { key: "class_id", label: "Class ID" },
        { key: "class_info", label: "Class Info" },
        { key: "class_time", label: "Class time" },
        { key: "Coach Name", label: "Coach Name" },
        { key: "Sport_center", label: "Sport Center" },
        { key: "court_no", label: "Court no." },
        { key: "max_number", label: "Max number" },
        { key: "ReservedNumber", label: "Reserved Number" },
        { key: "lesson_start_date", label: "Lesson Start Date" },
        { key: "lesson_end_date", label: "Lesson End Date" },
      ];

      function renderBookingTable(lessons) {
        var headRow = document.getElementById("fullLessonListHeadRow");
        var tb = document.getElementById("fullLessonListBody");
        if (!headRow || !tb) {
          return;
        }
        if (!lessons || !lessons.length) {
          headRow.innerHTML =
            '<th class="py-2 pr-3 font-medium text-slate-400">—</th>';
          tb.innerHTML =
            '<tr><td class="py-4 text-slate-500">No active bookings yet.</td></tr>';
          return;
        }
        headRow.innerHTML = BOOKING_TABLE_COLS.map(function (col) {
          return (
            '<th class="py-2 pr-3 font-medium text-slate-400 whitespace-nowrap max-w-[14rem]">' +
            escapeHtml(col.label) +
            "</th>"
          );
        }).join("");
        tb.innerHTML = lessons
          .map(function (L) {
            var tds = BOOKING_TABLE_COLS.map(function (col) {
              var v = L[col.key] != null ? String(L[col.key]) : "";
              var disp =
                window.api && typeof window.api.formatDateDisplayDdMmYyyy === "function"
                  ? window.api.formatDateDisplayDdMmYyyy(v)
                  : v;
              return (
                '<td class="py-2 pr-3 text-xs align-top whitespace-pre-wrap break-words max-w-[16rem]">' +
                escapeHtml(disp) +
                "</td>"
              );
            }).join("");
            return '<tr class="border-b border-white/5">' + tds + "</tr>";
          })
          .join("");
      }

      var loadSeq = 0;
      var loadAbort = null;

      function bookingsApiPath() {
        var cid = (getLessonModuleClubId() || "").trim();
        if (!cid) {
          return null;
        }
        return (
          "/coach-manager/lessons/student-bookings?clubId=" + encodeURIComponent(cid)
        );
      }

      function loadStudentBookings() {
        var errEl = document.getElementById("fullLessonListError");
        var warnEl = document.getElementById("fullLessonListWarn");
        if (errEl) {
          errEl.classList.add("hidden");
        }
        if (warnEl) {
          warnEl.classList.add("hidden");
          warnEl.textContent = "";
        }

        if (!window.api || typeof window.api.api !== "function") {
          if (errEl) {
            errEl.textContent =
              "Scripts failed to load. Open this site from the running Node server (same origin), not file://.";
            errEl.classList.remove("hidden");
          }
          renderBookingTable([]);
          return;
        }

        loadSeq += 1;
        var mySeq = loadSeq;
        if (loadAbort) {
          try {
            loadAbort.abort();
          } catch (abortErr) {
            /* ignore */
          }
        }
        loadAbort =
          typeof AbortController !== "undefined" ? new AbortController() : null;
        var fetchOpts = loadAbort ? { signal: loadAbort.signal } : {};

        var path = bookingsApiPath();
        if (!path) {
          if (errEl) {
            errEl.textContent =
              "Missing club context. Open My Bookings from the Student dashboard (Overview), or sign in again.";
            errEl.classList.remove("hidden");
          }
          renderBookingTable([]);
          return;
        }

        window.api
          .api(path, fetchOpts)
          .then(function (data) {
            if (mySeq !== loadSeq) {
              return;
            }
            if (!data || data.ok === false) {
              var failMsg =
                (data && data.error) || "Could not load bookings (server error).";
              if (errEl) {
                errEl.textContent = failMsg;
                errEl.classList.remove("hidden");
              }
              renderBookingTable([]);
              return;
            }
            if (data.clubId) {
              setUidLabels(data.clubId);
            }
            var list = Array.isArray(data.lessons) ? data.lessons : [];
            renderBookingTable(list);
          })
          .catch(function (e) {
            if (mySeq !== loadSeq) {
              return;
            }
            if (e && (e.name === "AbortError" || (e.cause && e.cause.name === "AbortError"))) {
              return;
            }
            var msg = e.message || "Could not load bookings.";
            if (e.status === 401 || /Unauthorized|Invalid token/i.test(msg)) {
              msg +=
                " Sign in on the same host you used to open this site (do not mix localhost and 127.0.0.1).";
            }
            if (errEl) {
              errEl.textContent = msg;
              errEl.classList.remove("hidden");
            }
            renderBookingTable([]);
          });
      }

      window.addEventListener("message", function (ev) {
        if (ev.origin !== window.location.origin) {
          return;
        }
        var d = ev.data;
        if (!d || d.type !== "sportCoach.clubContext") {
          return;
        }
        var cid = String(d.clubId || d.uid || "").trim();
        if (cid) {
          setUidLabels(cid);
        }
        if (
          window.api &&
          typeof window.api.setClubFolderContext === "function"
        ) {
          window.api.setClubFolderContext(
            cid || null,
            d.clubName != null && String(d.clubName).trim() !== ""
              ? String(d.clubName).trim()
              : null
          );
        }
        loadStudentBookings();
      });

      if (window.api && typeof window.api.api === "function") {
        window.api
          .api("/me")
          .then(function (d) {
            var u = d.user || {};
            var cfu =
              u.club_folder_uid != null && String(u.club_folder_uid).trim() !== ""
                ? String(u.club_folder_uid).trim()
                : "";
            setUidLabels(cfu || u.uid);
          })
          .catch(function () {
            /* ignore */
          })
          .finally(function () {
            loadStudentBookings();
          });
      } else {
        loadStudentBookings();
      }

      document.getElementById("btnLessonTimetable").addEventListener("click", function () {
        var cid = getLessonModuleClubId();
        var qs = ["myLessons=1"];
        if (cid) {
          qs.push("clubId=" + encodeURIComponent(cid));
        }
        var url =
          "/backend/lesson_modules/lesson_reservation/lesson-timetable.html?" +
          qs.join("&");
        window.open(url, "_blank", "noopener,noreferrer");
      });
    })();
  </script>
</body>
</html>
