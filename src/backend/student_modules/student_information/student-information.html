<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Information — Coach Manager</title>
  <link rel="dns-prefetch" href="https://cdn.tailwindcss.com" />
  <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin />
  <script defer src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/profile-password-panels.css" />
  <link rel="stylesheet" href="/css/coach-manager-module-shell.css" />
  <link rel="stylesheet" href="/css/btn-cancel-metallic-brown.css" />
  <link rel="stylesheet" href="/css/btn-remove-black-red-gold.css" />
  <link rel="stylesheet" href="/css/btn-dark-blue-green.css" />
</head>
<body class="profile-password-page cm-module-shell min-h-full p-4 sm:p-6">
  <div class="max-w-6xl mx-auto">
    <div class="glass profile-password-card rounded-xl border border-stone-200/60 p-5 sm:p-6">
    <header class="cm-module-page-header">
      <p id="backLinkWrap">
        <a href="/coach-manager.html" target="_top"
          class="cm-module-backlink text-sm underline-offset-2 hover:underline">
          ← Go Back
        </a>
      </p>
      <h1 class="profile-password-heading text-2xl font-semibold mt-3">Student Information</h1>
    </header>

    <section class="glass rounded-xl border border-white/15 p-4 mb-6 overflow-x-auto">
      <div
        class="student-roster-panel rounded-lg border border-amber-900/20 bg-gradient-to-br from-amber-50 via-orange-50/95 to-amber-100/85 p-4 text-[#3d2817] shadow-inner overflow-x-auto">
        <h2 class="text-lg font-semibold text-[#2c1810] mb-3">Student Roster</h2>
        <p id="fullCsvError" class="hidden text-sm text-red-800 mb-2"></p>
        <p id="fullCsvWarn" class="hidden text-sm text-[#5c4033] mb-2"></p>
        <table class="w-full text-sm text-left border-collapse min-w-max text-[#3d2817]">
          <thead>
            <tr id="fullCsvHeadRow" class="border-b border-amber-900/20 text-[#4a3410]">
              <th class="py-2 pr-3 font-medium">…</th>
            </tr>
          </thead>
          <tbody id="fullCsvBody">
            <tr><td class="py-4 text-[#5c4033]">Loading…</td></tr>
          </tbody>
        </table>

        <div
          id="studentPager"
          class="hidden mt-3 flex flex-wrap items-center justify-between gap-2 text-xs text-[#4a3410] border-t border-amber-900/20 pt-3">
          <span id="studentPagerStatus"></span>
          <div class="flex flex-wrap gap-2">
            <button
              type="button"
              id="studentPagerPrev"
              class="rounded-md border border-amber-900/25 bg-white/90 px-3 py-1.5 text-[#3d2817] hover:bg-amber-100 disabled:opacity-40 disabled:pointer-events-none">
              Previous
            </button>
            <button
              type="button"
              id="studentPagerNext"
              class="rounded-md border border-amber-900/25 bg-white/90 px-3 py-1.5 text-[#3d2817] hover:bg-amber-100 disabled:opacity-40 disabled:pointer-events-none">
              Next
            </button>
          </div>
        </div>
      </div>

      <div class="mt-4 flex flex-wrap gap-2">
        <button type="button" id="btnCreateNewStudent"
          class="btn-create-metallic-dark-brown rounded-lg px-4 py-2 text-sm">
          Create New Student
        </button>
        <button type="button" id="btnNewStudentRoleAccount"
          class="btn-dark-blue-green rounded-lg px-4 py-2 text-sm">
          New Login Account
        </button>
      </div>

      <div id="createStudentPanel" class="hidden mt-6 pt-6 border-t border-white/10 rounded-lg bg-slate-900/50 p-4">
        <h3 class="text-base font-semibold text-amber-200 mb-4">New student</h3>
        <form id="createStudentForm" class="space-y-3 max-w-2xl">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label for="newStudentFullName" class="block text-xs text-slate-400 mb-1">Full Name</label>
              <input id="newStudentFullName" type="text" required autocomplete="name"
                class="w-full rounded-lg bg-slate-900/60 border border-white/15 px-3 py-2 text-slate-100 text-sm [color-scheme:dark] focus:outline-none focus:ring-2 focus:ring-amber-500/50" />
            </div>
            <div>
              <label for="newStudentClubName" class="block text-xs text-slate-400 mb-1">Club ID</label>
              <input id="newStudentClubName" type="text" readonly tabindex="-1" aria-readonly="true"
                class="w-full rounded-lg bg-slate-950/80 border border-white/10 px-3 py-2 text-slate-400 text-sm cursor-not-allowed" />
            </div>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label for="newStudentDob" class="block text-xs text-slate-400 mb-1">Date of Birth</label>
              <input id="newStudentDob" type="text" inputmode="numeric" maxlength="10" autocomplete="off" placeholder="DD/MM/YYYY"
                class="date-field-ddmm w-full rounded-lg bg-slate-900/60 border border-white/15 px-3 py-2 text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/50" />
            </div>
            <div>
              <label for="newStudentJoined" class="block text-xs text-slate-400 mb-1">Joined Date</label>
              <input id="newStudentJoined" type="text" inputmode="numeric" maxlength="10" autocomplete="off" placeholder="DD/MM/YYYY" required
                class="date-field-ddmm w-full rounded-lg bg-slate-900/60 border border-white/15 px-3 py-2 text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/50" />
            </div>
          </div>
          <div>
            <label for="newStudentAddress" class="block text-xs text-slate-400 mb-1">Home Address</label>
            <input id="newStudentAddress" type="text" autocomplete="street-address"
              class="w-full rounded-lg bg-slate-900/60 border border-white/15 px-3 py-2 text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/50" />
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <div>
              <label for="newStudentSex" class="block text-xs text-slate-400 mb-1">Sex</label>
              <select id="newStudentSex" required
                class="w-full rounded-lg bg-slate-900/60 border border-white/15 px-3 py-2 text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/50">
                <option value="M">M</option>
                <option value="F">F</option>
                <option value="N/A" selected>N/A</option>
              </select>
            </div>
            <div>
              <label for="newStudentCountry" class="block text-xs text-slate-400 mb-1">Country</label>
              <select id="newStudentCountry" required
                class="w-full rounded-lg bg-slate-900/60 border border-white/15 px-3 py-2 text-slate-100 text-sm [color-scheme:dark] focus:outline-none focus:ring-2 focus:ring-amber-500/50">
              </select>
            </div>
            <div>
              <label for="newStudentPhone" class="block text-xs text-slate-400 mb-1">Contact Number</label>
              <input id="newStudentPhone" type="text" autocomplete="tel"
                class="w-full rounded-lg bg-slate-900/60 border border-white/15 px-3 py-2 text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/50" />
            </div>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label for="newStudentSchool" class="block text-xs text-slate-400 mb-1">School</label>
              <input id="newStudentSchool" type="text"
                class="w-full rounded-lg bg-slate-900/60 border border-white/15 px-3 py-2 text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/50" />
            </div>
            <div>
              <label for="newStudentEmail" class="block text-xs text-slate-400 mb-1">Email Address</label>
              <input id="newStudentEmail" type="email" required autocomplete="email"
                class="w-full rounded-lg bg-slate-900/60 border border-white/15 px-3 py-2 text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/50" />
            </div>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label for="newStudentGuardian" class="block text-xs text-slate-400 mb-1">Guardian</label>
              <input id="newStudentGuardian" type="text"
                class="w-full rounded-lg bg-slate-900/60 border border-white/15 px-3 py-2 text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/50" />
            </div>
            <div>
              <label for="newStudentGuardianContact" class="block text-xs text-slate-400 mb-1">Guardian Contact</label>
              <input id="newStudentGuardianContact" type="text" autocomplete="tel"
                class="w-full rounded-lg bg-slate-900/60 border border-white/15 px-3 py-2 text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/50" />
            </div>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label for="newStudentStudentCoach" class="block text-xs text-slate-400 mb-1">Student coach</label>
              <select id="newStudentStudentCoach"
                class="w-full rounded-lg bg-slate-900/60 border border-white/15 px-3 py-2 text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/50">
                <option value="N/A">N/A</option>
              </select>
            </div>
            <div>
              <label for="newStudentRemark" class="block text-xs text-slate-400 mb-1">Remark</label>
              <input id="newStudentRemark" type="text"
                class="w-full rounded-lg bg-slate-900/60 border border-white/15 px-3 py-2 text-slate-100 text-sm focus:outline-none focus:ring-2 focus:ring-amber-500/50" />
            </div>
          </div>
          <p id="createStudentErr" class="hidden text-sm text-red-300"></p>
          <p id="createStudentOk" class="hidden text-sm text-amber-300"></p>
          <div class="flex flex-wrap gap-2 pt-2">
            <button type="submit" id="createStudentSubmitBtn"
              class="btn-confirm-black rounded-lg px-4 py-2 text-sm disabled:opacity-50 disabled:pointer-events-none">
              Confirm
            </button>
            <button type="button" id="createStudentCancelBtn"
              class="btn-cancel-metallic-brown rounded-lg px-4 py-2 text-sm">
              Cancel
            </button>
          </div>
        </form>
      </div>

      <div id="tableEditPanel" class="hidden mt-6 pt-6 border-t border-amber-900/25 rounded-lg bg-gradient-to-br from-amber-50 via-orange-50/90 to-amber-100/80 p-4 text-[#3d2817] shadow-inner">
        <h3 class="text-base font-semibold text-[#2c1810] mb-3">Edit student</h3>
        <form id="tableEditForm" class="space-y-3 max-w-5xl text-[#3d2817]">
          <p class="text-[11px] uppercase tracking-wide text-[#4a3410] font-medium">Read-only</p>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label for="tableEditStudentId" class="block text-xs text-[#4a3410] mb-1">Student ID</label>
              <input id="tableEditStudentId" type="text" readonly
                class="w-full rounded-lg bg-white/90 border border-amber-900/20 px-3 py-2 text-[#3d2817] text-sm cursor-not-allowed" />
            </div>
            <div>
              <label for="tableEditClubName" class="block text-xs text-[#4a3410] mb-1">Club ID</label>
              <input id="tableEditClubName" type="text" readonly
                class="w-full rounded-lg bg-white/90 border border-amber-900/20 px-3 py-2 text-[#3d2817] text-sm cursor-not-allowed" />
            </div>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label for="tableEditCreated" class="block text-xs text-[#4a3410] mb-1">Created At</label>
              <input id="tableEditCreated" type="text" readonly
                class="w-full rounded-lg bg-white/90 border border-amber-900/20 px-3 py-2 text-[#3d2817] text-sm cursor-not-allowed" />
            </div>
            <div>
              <label for="tableEditLastUpdate" class="block text-xs text-[#4a3410] mb-1">Last Update Date (current file value)</label>
              <input id="tableEditLastUpdate" type="text" readonly
                class="w-full rounded-lg bg-white/90 border border-amber-900/20 px-3 py-2 text-[#3d2817] text-sm cursor-not-allowed" />
            </div>
          </div>
          <p class="text-[11px] uppercase tracking-wide text-[#4a3410] font-medium pt-2 border-t border-amber-900/15">You can edit</p>
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <div class="sm:col-span-1 min-w-0">
              <label for="tableEditFullName" class="block text-xs text-[#4a3410] mb-1">Full Name</label>
              <input id="tableEditFullName" type="text" required autocomplete="name"
                class="w-full rounded-lg bg-white border border-amber-900/25 px-3 py-2 text-[#3d2817] text-sm placeholder:text-[#6b5344]/60 focus:outline-none focus:ring-2 focus:ring-amber-700/35" />
            </div>
            <div>
              <label for="tableEditSex" class="block text-xs text-[#4a3410] mb-1">Sex</label>
              <select id="tableEditSex"
                class="w-full rounded-lg bg-white border border-amber-900/25 px-3 py-2 text-[#3d2817] text-sm [color-scheme:light] focus:outline-none focus:ring-2 focus:ring-amber-700/35">
                <option value="">—</option>
                <option value="M">M</option>
                <option value="F">F</option>
                <option value="N/A">N/A</option>
              </select>
            </div>
            <div>
              <label for="tableEditCountry" class="block text-xs text-[#4a3410] mb-1">Country</label>
              <select id="tableEditCountry"
                class="w-full rounded-lg bg-white border border-amber-900/25 px-3 py-2 text-[#3d2817] text-sm [color-scheme:light] focus:outline-none focus:ring-2 focus:ring-amber-700/35">
                <option value="">—</option>
                <option value="Hong Kong">Hong Kong</option>
                <option value="China">China</option>
                <option value="Taiwan">Taiwan</option>
                <option value="Malaysia">Malaysia</option>
                <option value="Korea">Korea</option>
              </select>
            </div>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label for="tableEditSchool" class="block text-xs text-[#4a3410] mb-1">School</label>
              <input id="tableEditSchool" type="text"
                class="w-full rounded-lg bg-white border border-amber-900/25 px-3 py-2 text-[#3d2817] text-sm placeholder:text-[#6b5344]/60 focus:outline-none focus:ring-2 focus:ring-amber-700/35" />
            </div>
            <div>
              <label for="tableEditHomeAddress" class="block text-xs text-[#4a3410] mb-1">Home Address</label>
              <input id="tableEditHomeAddress" type="text" autocomplete="street-address"
                class="w-full rounded-lg bg-white border border-amber-900/25 px-3 py-2 text-[#3d2817] text-sm placeholder:text-[#6b5344]/60 focus:outline-none focus:ring-2 focus:ring-amber-700/35" />
            </div>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label for="tableEditDateOfBirth" class="block text-xs text-[#4a3410] mb-1">Date of Birth</label>
              <input id="tableEditDateOfBirth" type="text" inputmode="numeric" maxlength="10" autocomplete="off" placeholder="DD/MM/YYYY"
                class="date-field-ddmm w-full rounded-lg bg-white border border-amber-900/25 px-3 py-2 text-[#3d2817] text-sm placeholder:text-[#6b5344]/60 focus:outline-none focus:ring-2 focus:ring-amber-700/35" />
            </div>
            <div>
              <label for="tableEditJoinedDate" class="block text-xs text-[#4a3410] mb-1">Joined Date</label>
              <input id="tableEditJoinedDate" type="text" inputmode="numeric" maxlength="10" autocomplete="off" placeholder="DD/MM/YYYY"
                class="date-field-ddmm w-full rounded-lg bg-white border border-amber-900/25 px-3 py-2 text-[#3d2817] text-sm placeholder:text-[#6b5344]/60 focus:outline-none focus:ring-2 focus:ring-amber-700/35" />
            </div>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label for="tableEditContactNumber" class="block text-xs text-[#4a3410] mb-1">Contact Number</label>
              <input id="tableEditContactNumber" type="text" autocomplete="tel"
                class="w-full rounded-lg bg-white border border-amber-900/25 px-3 py-2 text-[#3d2817] text-sm placeholder:text-[#6b5344]/60 focus:outline-none focus:ring-2 focus:ring-amber-700/35" />
            </div>
            <div>
              <label for="tableEditEmail" class="block text-xs text-[#4a3410] mb-1">Email Address</label>
              <input id="tableEditEmail" type="email" required autocomplete="email"
                class="w-full rounded-lg bg-white border border-amber-900/25 px-3 py-2 text-[#3d2817] text-sm placeholder:text-[#6b5344]/60 focus:outline-none focus:ring-2 focus:ring-amber-700/35" />
            </div>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
            <div>
              <label for="tableEditGuardian" class="block text-xs text-[#4a3410] mb-1">Guardian</label>
              <input id="tableEditGuardian" type="text"
                class="w-full rounded-lg bg-white border border-amber-900/25 px-3 py-2 text-[#3d2817] text-sm placeholder:text-[#6b5344]/60 focus:outline-none focus:ring-2 focus:ring-amber-700/35" />
            </div>
            <div>
              <label for="tableEditGuardianContact" class="block text-xs text-[#4a3410] mb-1">Guardian Contact</label>
              <input id="tableEditGuardianContact" type="text" autocomplete="tel"
                class="w-full rounded-lg bg-white border border-amber-900/25 px-3 py-2 text-[#3d2817] text-sm placeholder:text-[#6b5344]/60 focus:outline-none focus:ring-2 focus:ring-amber-700/35" />
            </div>
          </div>
          <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
            <div>
              <label for="tableEditStudentCoach" class="block text-xs text-[#4a3410] mb-1">Student coach</label>
              <select id="tableEditStudentCoach"
                class="w-full rounded-lg bg-white border border-amber-900/25 px-3 py-2 text-[#3d2817] text-sm [color-scheme:light] focus:outline-none focus:ring-2 focus:ring-amber-700/35">
                <option value="N/A">N/A</option>
              </select>
            </div>
            <div>
              <label for="tableEditStatus" class="block text-xs text-[#4a3410] mb-1">Status</label>
              <select id="tableEditStatus"
                class="w-full rounded-lg bg-white border border-amber-900/25 px-3 py-2 text-[#3d2817] text-sm [color-scheme:light] focus:outline-none focus:ring-2 focus:ring-amber-700/35">
                <option value="ACTIVE">ACTIVE</option>
                <option value="INACTIVE">INACTIVE</option>
              </select>
            </div>
            <div class="sm:col-span-1 min-w-0">
              <label for="tableEditRemark" class="block text-xs text-[#4a3410] mb-1">Remark</label>
              <input id="tableEditRemark" type="text"
                class="w-full rounded-lg bg-white border border-amber-900/25 px-3 py-2 text-[#3d2817] text-sm placeholder:text-[#6b5344]/60 focus:outline-none focus:ring-2 focus:ring-amber-700/35" />
            </div>
          </div>
          <p id="tableEditErr" class="hidden text-sm text-red-800"></p>
          <p id="tableEditOk" class="hidden text-sm text-[#5c4033] font-medium"></p>
          <div class="flex flex-wrap gap-2 pt-2">
            <button type="button" id="tableEditConfirmBtn"
              class="btn-confirm-black rounded-lg px-4 py-2 text-sm disabled:opacity-50 disabled:pointer-events-none">
              Confirm
            </button>
            <button type="button" id="tableEditCancelBtn"
              class="btn-cancel-metallic-brown rounded-lg px-4 py-2 text-sm">
              Cancel
            </button>
          </div>
        </form>
      </div>
    </section>
    </div>
  </div>

  <div id="removeUserConfirmModal" class="fixed inset-0 z-[80] hidden" aria-hidden="true" role="dialog" aria-labelledby="removeUserConfirmTitle">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" id="removeUserConfirmBackdrop"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4 pointer-events-none">
      <div
        class="pointer-events-auto w-full max-w-md rounded-xl border border-white/15 bg-slate-900/95 shadow-xl p-5 text-slate-100">
        <p id="removeUserConfirmTitle" class="text-base text-slate-100 mb-5">Confirm to remove the user</p>
        <div class="flex flex-wrap gap-2 justify-end">
          <button type="button" id="removeUserConfirmNo"
            class="rounded-lg bg-slate-700 hover:bg-slate-600 border border-white/15 text-slate-100 px-4 py-2 text-sm font-medium">
            No, thanks
          </button>
          <button type="button" id="removeUserConfirmYes"
            class="rounded-lg bg-red-600 hover:bg-red-500 text-white px-4 py-2 text-sm font-medium disabled:opacity-50">
            YES
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="newStudentRoleAccountModal" class="fixed inset-0 z-[85] hidden" aria-hidden="true" role="dialog"
    aria-labelledby="newStudentRoleAccountTitle">
    <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" id="newStudentRoleAccountBackdrop"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4 pointer-events-none">
      <div
        class="pointer-events-auto w-full max-w-md rounded-xl border border-amber-600/40 bg-gradient-to-br from-zinc-950 via-stone-950 to-black p-5 text-amber-50 shadow-[0_25px_60px_-12px_rgba(0,0,0,0.9),0_0_0_1px_rgba(212,175,55,0.08),0_0_80px_-20px_rgba(180,134,11,0.12)] ring-1 ring-amber-500/20">
        <h2 id="newStudentRoleAccountTitle" class="text-base font-semibold text-amber-200 mb-4 tracking-tight">New Login Account for  Student</h2>
        <div class="space-y-3">
          <div>
            <label for="newStudentRoleFullName" class="block text-xs text-amber-200/55 mb-1">Full Name</label>
            <select id="newStudentRoleFullName"
              class="w-full rounded-lg bg-black/50 border border-amber-900/45 px-3 py-2 text-sm text-white caret-white [color-scheme:dark] focus:outline-none focus:ring-2 focus:ring-amber-600/35 focus:border-amber-600/40">
              <option value="">— Select —</option>
            </select>
          </div>
          <div>
            <label for="newStudentRoleUsername" class="block text-xs text-amber-200/55 mb-1">Username</label>
            <input id="newStudentRoleUsername" type="text" autocomplete="username"
              class="w-full rounded-lg bg-black/50 border border-amber-900/45 px-3 py-2 text-sm text-white caret-white placeholder:text-white/35 [color-scheme:dark] focus:outline-none focus:ring-2 focus:ring-amber-600/35 focus:border-amber-600/40" />
          </div>
          <div>
            <label for="newStudentRolePassword" class="block text-xs text-amber-200/55 mb-1">Password</label>
            <input id="newStudentRolePassword" type="password" autocomplete="new-password"
              class="w-full rounded-lg bg-black/50 border border-amber-900/45 px-3 py-2 text-sm text-amber-300 caret-amber-300 placeholder:text-amber-400/45 [color-scheme:dark] focus:outline-none focus:ring-2 focus:ring-amber-600/35 focus:border-amber-600/40" />
          </div>
          <div>
            <label for="newStudentRolePassword2" class="block text-xs text-amber-200/55 mb-1">Re-enter Password</label>
            <input id="newStudentRolePassword2" type="password" autocomplete="new-password"
              class="w-full rounded-lg bg-black/50 border border-amber-900/45 px-3 py-2 text-sm text-amber-300 caret-amber-300 placeholder:text-amber-400/45 [color-scheme:dark] focus:outline-none focus:ring-2 focus:ring-amber-600/35 focus:border-amber-600/40" />

        <div class="flex flex-wrap gap-2 justify-end mt-5">

            class="btn-cancel-metallic-brown rounded-lg px-4 py-2 text-sm">
            Cancel
          </button>
          <button type="button" id="newStudentRoleAccountOk"
            class="rounded-lg border border-amber-400/35 bg-gradient-to-b from-amber-500 to-amber-700 hover:from-amber-400 hover:to-amber-600 text-black px-4 py-2 text-sm font-semibold shadow-[inset_0_1px_0_rgba(255,255,255,0.25)] disabled:opacity-50">
            OK
          </button>
        </div>
      </div>
    </div>
  </div>

  <div id="loginAccountSuccessModal" class="fixed inset-0 z-[95] hidden" aria-hidden="true" role="dialog"
    aria-labelledby="loginAccountSuccessTitle">
    <div class="absolute inset-0 bg-black/55 backdrop-blur-sm" id="loginAccountSuccessBackdrop"></div>
    <div class="absolute inset-0 flex items-center justify-center p-4 pointer-events-none">
      <div
        class="pointer-events-auto w-full max-w-md rounded-xl border border-emerald-700/25 bg-gradient-to-br from-stone-50 via-white to-emerald-50/90 p-5 text-stone-900 shadow-[0_25px_60px_-12px_rgba(0,0,0,0.35),0_0_0_1px_rgba(52,211,153,0.2),0_0_50px_-20px_rgba(16,185,129,0.15)] ring-1 ring-stone-200/80">
        <h2 id="loginAccountSuccessTitle" class="text-base font-semibold text-stone-900 mb-3 tracking-tight">
          Login account created
        </h2>
        <p id="loginAccountSuccessMessage"
          class="text-sm text-stone-800 leading-relaxed whitespace-pre-wrap"></p>
        <div class="flex justify-end mt-5">
          <button type="button" id="loginAccountSuccessClose"
            class="rounded-lg border border-amber-400/40 bg-gradient-to-b from-amber-500 to-amber-800 hover:from-amber-400 hover:to-amber-700 text-white px-5 py-2 text-sm font-semibold shadow-[inset_0_1px_0_rgba(255,255,255,0.2),0_4px_14px_-4px_rgba(0,0,0,0.45)]">
            OK
          </button>
        </div>
      </div>

  </div>

  <script src="/js/api.js"></script>
  <script src="/js/date-ddmm-ui.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    (function () {
      var isFramed = false;
      try {
        isFramed = window.self !== window.top;
      } catch (e) {
        isFramed = true;
      }

      var token =
        window.auth &&
        typeof window.auth.getToken === "function" &&
        window.auth.getToken();
      var role = localStorage.getItem("userRole");
      var sessionOk =
        Boolean(token) &&
        (role === "CoachManager" || role === "Coach");

      var btnNewStudentRole = document.getElementById("btnNewStudentRoleAccount");
      if (btnNewStudentRole && role !== "CoachManager") {
        btnNewStudentRole.classList.add("hidden");
      }

      function setUidLabels(uid) {
        var u = uid && String(uid).trim() ? String(uid).trim() : "…";
        var el = document.getElementById("hdrUid");
        if (el) {
          el.textContent = u;
        }
        document.querySelectorAll(".hdrUidInline").forEach(function (n) {
          n.textContent = u;
        });
      }

      var cachedManagerClubName = "";
      var cachedManagerClubFolderId = "";
      /** Avoid refetching coach dropdown on every student list page when club_id unchanged. */
      var lastCoachOptionsClubId = "";

      (function primeClubIdFromUrlOrCache() {
        var q = new URLSearchParams(window.location.search || "");
        var id = (q.get("club_id") || q.get("clubId") || q.get("uid") || "").trim();
        var ctx =
          window.api &&
          window.api.getClubFolderContext &&
          window.api.getClubFolderContext();
        if (ctx && ctx.clubId) {
          id = id || String(ctx.clubId).trim();
        }
        if (id) {
          setUidLabels(id);
          cachedManagerClubFolderId = id;
        }
      })();

      function getManagerClubNameFromUrl() {
        var q = new URLSearchParams(window.location.search || "");
        var raw = q.get("clubName");
        if (raw == null || String(raw).trim() === "") {
          return "";
        }
        try {
          return decodeURIComponent(String(raw).replace(/\+/g, " ")).trim();
        } catch (e) {
          return String(raw).trim();
        }
      }

      function resolveManagerClubName() {
        var fromUrl = getManagerClubNameFromUrl();
        if (fromUrl) {
          return fromUrl;
        }
        var ctx =
          window.api &&
          window.api.getClubFolderContext &&
          window.api.getClubFolderContext();
        if (ctx && ctx.clubName && String(ctx.clubName).trim() !== "") {
          return String(ctx.clubName).trim();
        }
        if (cachedManagerClubName && String(cachedManagerClubName).trim() !== "") {
          return String(cachedManagerClubName).trim();
        }
        return "";
      }

      function resolveManagerClubFolderId() {
        var q = new URLSearchParams(window.location.search || "");
        var id = (q.get("club_id") || q.get("clubId") || q.get("uid") || "").trim();
        var ctx =
          window.api &&
          window.api.getClubFolderContext &&
          window.api.getClubFolderContext();
        if (ctx && ctx.clubId) {
          id = id || String(ctx.clubId).trim();
        }
        if (id) {
          return id;
        }
        if (
          cachedManagerClubFolderId &&
          String(cachedManagerClubFolderId).trim() !== ""
        ) {
          return String(cachedManagerClubFolderId).trim();
        }
        return "";
      }

      function setNewStudentClubNameField() {
        var el = document.getElementById("newStudentClubName");
        if (!el) {
          return;
        }
        el.value = resolveManagerClubFolderId() || resolveManagerClubName();
      }

      setNewStudentClubNameField();

      if (role === "Coach") {
        var siIntro = document.querySelector("section.glass > p.text-xs");
        if (siIntro) {
          siIntro.textContent =
            "Showing students whose Student coach matches your roster name, login, or Coach ID (MongoDB UserList_Student; legacy JSON roster when Mongo is off).";
        }
      }

      if (!sessionOk) {
        if (
          !isFramed &&
          !window.auth.guardPage("CoachManager") &&
          !window.auth.guardPage("Coach")
        ) {
          return;
        }
      } else if (!isFramed) {
        if (role === "CoachManager" && !window.auth.guardPage("CoachManager")) {
          return;
        }
        if (role === "Coach" && !window.auth.guardPage("Coach")) {
          return;
        }
      }

      function escapeHtml(s) {
        if (s == null) {
          return "";
        }
        return String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      var cachedStudents = [];
      var STUDENT_LIST_PAGE_SIZE = 10;
      var studentListPage = 1;
      var studentListTotal = 0;
      var cachedAllStudentsForModal = null;
      /** Paginate roster API calls for Coach Manager and Coach (avoids loading entire roster per request). */
      var useStudentPager = role === "CoachManager" || role === "Coach";
      /** Last countries from GET /basic-info — refill after form.reset() (reset clears dynamic &lt;option&gt;s). */
      var cachedBasicInfoCountries = [];

      function invalidateStudentListCache() {
        cachedAllStudentsForModal = null;
        if (window.api && typeof window.api.clearJsonGetCache === "function") {
          window.api.clearJsonGetCache();
        }
      }

      function updateStudentPaginationUi() {
        var bar = document.getElementById("studentPager");
        var st = document.getElementById("studentPagerStatus");
        if (!bar || !st) {
          return;
        }
        if (!useStudentPager) {
          bar.classList.add("hidden");
          return;
        }
        var pages = Math.max(1, Math.ceil(studentListTotal / STUDENT_LIST_PAGE_SIZE));
        if (pages <= 1) {
          bar.classList.add("hidden");
          return;
        }
        bar.classList.remove("hidden");
        st.textContent =
          "Page " +
          studentListPage +
          " of " +
          pages +
          " · " +
          studentListTotal +
          " students";
        var prev = document.getElementById("studentPagerPrev");
        var next = document.getElementById("studentPagerNext");
        if (prev) {
          prev.disabled = studentListPage <= 1;
        }
        if (next) {
          next.disabled = studentListPage >= pages;
        }
      }

      /** Options for New Login modal: full roster via GET /coach-manager/students?compact=1 */
      function fillNewStudentRoleFullNameSelect() {
        var sel = document.getElementById("newStudentRoleFullName");
        if (!sel || sel.tagName !== "SELECT") {
          return;
        }
        sel.innerHTML = "";
        var lead = document.createElement("option");
        lead.value = "";
        lead.textContent = "— Select —";
        sel.appendChild(lead);
        var list = Array.isArray(cachedAllStudentsForModal)
          ? cachedAllStudentsForModal.slice()
          : [];
        var rows = [];
        list.forEach(function (s) {
          var fn = s.full_name != null ? String(s.full_name).trim() : "";
          if (!fn) {
            return;
          }
          rows.push({
            fullName: fn,
            studentId:
              s.student_id != null && String(s.student_id).trim()
                ? String(s.student_id).trim()
                : s.StudentID != null
                  ? String(s.StudentID).trim()
                  : "",
          });
        });
        rows.sort(function (a, b) {
          var c = a.fullName.localeCompare(b.fullName, undefined, {
            sensitivity: "base",
          });
          return c !== 0 ? c : a.studentId.localeCompare(b.studentId);
        });
        var nameCount = Object.create(null);
        rows.forEach(function (r) {
          var k = r.fullName.toLowerCase();
          nameCount[k] = (nameCount[k] || 0) + 1;
        });
        rows.forEach(function (row) {
          var k = row.fullName.toLowerCase();
          var opt = document.createElement("option");
          opt.value = row.fullName;
          var label = row.fullName;
          if (nameCount[k] > 1 && row.studentId) {
            var sidDisp =
              window.api && typeof window.api.displayStudentIdForUi === "function"
                ? window.api.displayStudentIdForUi(row.studentId)
                : row.studentId;
            label = row.fullName + " (" + sidDisp + ")";
          }
          opt.textContent = label;
          sel.appendChild(opt);
        });
      }

      var STUDENT_TABLE_COLS = [
        { key: "club_name", label: "Club Name" },
        { key: "student_id", label: "Student ID" },
        { key: "full_name", label: "Full Name" },
        { key: "sex", label: "Sex" },
        { key: "date_of_birth", label: "Date of Birth" },
        { key: "school", label: "School" },
        { key: "student_coach", label: "Student Coach" },
        { key: "contact_number", label: "Contact Number" },
        { key: "email", label: "Email Address" },
        { key: "guardian", label: "Guardian" },
        { key: "guardian_contact", label: "Guardian Contact" },
        { key: "status", label: "Status" },
        { key: "home_address", label: "Home Address" },
        { key: "country", label: "Country" },
        { key: "joined_date", label: "Joined Date" },
        { key: "remark", label: "Remark" },
        { key: "creation_date", label: "Created At" },
        { key: "lastUpdate_date", label: "Last Update Date" },
      ];

      function hideCreateStudentPanel() {
        var p = document.getElementById("createStudentPanel");
        if (p) {
          p.classList.add("hidden");
        }
        var ce = document.getElementById("createStudentErr");
        var co = document.getElementById("createStudentOk");
        if (ce) {
          ce.classList.add("hidden");
          ce.textContent = "";
        }
        if (co) {
          co.classList.add("hidden");
          co.textContent = "";
        }
      }

      function hideTableEditPanel() {
        var p = document.getElementById("tableEditPanel");
        if (p) {
          p.classList.add("hidden");
        }
        var sidEl = document.getElementById("tableEditStudentId");
        if (sidEl && sidEl.dataset) {
          delete sidEl.dataset.fullStudentId;
        }
        var err = document.getElementById("tableEditErr");
        var ok = document.getElementById("tableEditOk");
        if (err) {
          err.classList.add("hidden");
          err.textContent = "";
        }
        if (ok) {
          ok.classList.add("hidden");
          ok.textContent = "";
        }
      }

      function hideAllStudentPanels() {
        hideTableEditPanel();
        hideCreateStudentPanel();
      }

      function isoDateForPicker(s) {
        if (
          window.api &&
          typeof window.api.formatStoredDateToDdMmYyyy === "function"
        ) {
          return window.api.formatStoredDateToDdMmYyyy(s);
        }
        var t = (s == null ? "" : String(s)).trim();
        return /^\d{4}-\d{2}-\d{2}$/.test(t) ? t : "";
      }

      function bindSelectWithOrphan(sel, value) {
        if (!sel) {
          return;
        }
        sel.querySelectorAll("option[data-orphan]").forEach(function (o) {
          o.remove();
        });
        var v = value == null ? "" : String(value).trim();
        sel.value = v;
        if (v && sel.value !== v) {
          var opt = document.createElement("option");
          opt.value = v;
          opt.textContent = v;
          opt.setAttribute("data-orphan", "1");
          sel.appendChild(opt);
          sel.value = v;
        }
      }

      function setSelectToValue(sel, value) {
        if (!sel) {
          return;
        }
        var v = value == null ? "" : String(value).trim();
        sel.value = v;
        if (v && sel.value !== v) {
          var opt = document.createElement("option");
          opt.value = v;
          opt.textContent = v;
          sel.appendChild(opt);
          sel.value = v;
        }
      }

      function refillCountrySelectFromBasicInfo(selectId, values) {
        var sel = document.getElementById(selectId);
        if (!sel) {
          return;
        }
        var prev = String(sel.value || "").trim();
        sel.innerHTML = "";
        var emptyOpt = document.createElement("option");
        emptyOpt.value = "";
        emptyOpt.textContent = "—";
        sel.appendChild(emptyOpt);
        var list = Array.isArray(values) ? values : [];
        for (var i = 0; i < list.length; i++) {
          var raw = list[i];
          var value = "";
          var label = "";
          if (raw != null && typeof raw === "object" && raw.name != null) {
            value = String(raw.name).trim();
            var pfx =
              raw.prefix != null ? String(raw.prefix).trim() : "";
            label = pfx ? value + " (" + pfx + ")" : value;
          } else {
            value = raw == null ? "" : String(raw).trim();
            label = value;
          }
          if (!value) {
            continue;
          }
          var o = document.createElement("option");
          o.value = value;
          o.textContent = label;
          sel.appendChild(o);
        }
        setSelectToValue(sel, prev);
      }

      function refillStudentCountryDropdownsFromCache() {
        refillCountrySelectFromBasicInfo("newStudentCountry", cachedBasicInfoCountries);
        refillCountrySelectFromBasicInfo("tableEditCountry", cachedBasicInfoCountries);
      }

      function initCountrySelectsFromBasicInfo() {
        if (!window.api || typeof window.api.api !== "function") {
          return Promise.resolve();
        }
        return window.api
          .api("/basic-info", { cacheTtlMs: 120000 })
          .then(function (data) {
            if (!data || data.ok === false) {
              return;
            }
            cachedBasicInfoCountries = Array.isArray(data.countries)
              ? data.countries
              : [];
            refillStudentCountryDropdownsFromCache();
          })
          .catch(function () {
            /* dropdowns stay empty */
          });
      }

      function fillStudentCoachSelectFromNames(sel, names) {
        if (!sel || sel.tagName !== "SELECT") {
          return;
        }
        sel.innerHTML = "";
        var naOpt = document.createElement("option");
        naOpt.value = "N/A";
        naOpt.textContent = "N/A";
        sel.appendChild(naOpt);
        names.forEach(function (nm) {
          var opt = document.createElement("option");
          opt.value = nm;
          opt.textContent = nm;
          sel.appendChild(opt);
        });
      }

      /**
       * Fills Create + Edit Student coach selects from GET /coach-manager/coaches?compact=1
       * (MongoDB UserList_Coach in ClubMaster_DB, scoped by session club_id / club_folder_uid).
       */
      function loadStudentCoachSelectOptions() {
        if (!window.api || typeof window.api.api !== "function") {
          return Promise.resolve();
        }
        var cid =
          typeof cachedManagerClubFolderId === "string"
            ? cachedManagerClubFolderId.trim()
            : "";
        var path = "/coach-manager/coaches?compact=1";
        if (cid) {
          path += "&club_id=" + encodeURIComponent(cid);
        }
        return window.api
          .api(path, { cacheTtlMs: 120000 })
          .then(function (data) {
          if (!data || data.ok === false) {
            return;
          }
          var names = [];
          var seen = Object.create(null);
          (Array.isArray(data.coaches) ? data.coaches : []).forEach(function (c) {
            var st =
              c.status != null && String(c.status).trim() !== ""
                ? String(c.status).trim().toUpperCase()
                : "ACTIVE";
            if (st !== "ACTIVE") {
              return;
            }
            var fn = c.full_name != null ? String(c.full_name).trim() : "";
            if (fn && !seen[fn]) {
              seen[fn] = true;
              names.push(fn);
            }
          });
          names.sort(function (a, b) {
            return a.localeCompare(b, undefined, { sensitivity: "base" });
          });
          fillStudentCoachSelectFromNames(
            document.getElementById("tableEditStudentCoach"),
            names
          );
          fillStudentCoachSelectFromNames(
            document.getElementById("newStudentStudentCoach"),
            names
          );
            if (cid) {
              lastCoachOptionsClubId = cid;
            }
        });
      }

      function setNewStudentCountryToFirst() {
        var el = document.getElementById("newStudentCountry");
        if (el && el.options.length > 1) {
          el.selectedIndex = 1;
        } else if (el && el.options.length === 1) {
          el.selectedIndex = 0;
        }
      }

      function ymdTodayLocal() {
        if (
          window.api &&
          typeof window.api.formatDateDisplayDdMmYyyy === "function"
        ) {
          return window.api.formatDateDisplayDdMmYyyy(
            new Date().toISOString().slice(0, 10),
          );
        }
        var d = new Date();
        var y = d.getFullYear();
        var m = String(d.getMonth() + 1).padStart(2, "0");
        var day = String(d.getDate()).padStart(2, "0");
        return day + "/" + m + "/" + y;
      }

      function openTableEditPanelFromStudent(s) {
        hideCreateStudentPanel();
        var fullSid =
          (s.student_id != null && String(s.student_id).trim()
            ? String(s.student_id).trim()
            : s.StudentID) || "";
        var sidInput = document.getElementById("tableEditStudentId");
        sidInput.value =
          window.api && typeof window.api.displayStudentIdForUi === "function"
            ? window.api.displayStudentIdForUi(fullSid)
            : fullSid;
        sidInput.setAttribute("title", fullSid);
        if (sidInput.dataset) {
          sidInput.dataset.fullStudentId = fullSid;
        }
        document.getElementById("tableEditClubName").value =
          s.club_id || s.club_name || "";
        document.getElementById("tableEditFullName").value = s.full_name || "";
        bindSelectWithOrphan(document.getElementById("tableEditSex"), s.sex);
        document.getElementById("tableEditDateOfBirth").value =
          isoDateForPicker(s.date_of_birth);
        document.getElementById("tableEditJoinedDate").value =
          isoDateForPicker(s.joined_date);
        document.getElementById("tableEditHomeAddress").value =
          s.home_address || "";
        bindSelectWithOrphan(document.getElementById("tableEditCountry"), s.country);
        document.getElementById("tableEditEmail").value = s.email || "";
        document.getElementById("tableEditContactNumber").value =
          s.contact_number || "";
        document.getElementById("tableEditGuardian").value = s.guardian || "";
        document.getElementById("tableEditGuardianContact").value =
          s.guardian_contact || "";
        document.getElementById("tableEditSchool").value = s.school || "";
        var sc =
          s.student_coach != null && String(s.student_coach).trim() !== ""
            ? String(s.student_coach).trim()
            : "N/A";
        bindSelectWithOrphan(document.getElementById("tableEditStudentCoach"), sc);
        var st = (s.status || "ACTIVE").toString().trim().toUpperCase();
        document.getElementById("tableEditStatus").value =
          st === "INACTIVE" ? "INACTIVE" : "ACTIVE";
        document.getElementById("tableEditRemark").value = s.remark || "";
        document.getElementById("tableEditCreated").value =
          (window.api && typeof window.api.formatDateDisplayDdMmYyyy === "function"
            ? window.api.formatDateDisplayDdMmYyyy(
                s.creation_date || s.created_at || "",
              )
            : "") ||
          (s.creation_date || s.created_at || "");
        document.getElementById("tableEditLastUpdate").value =
          (window.api && typeof window.api.formatDateDisplayDdMmYyyy === "function"
            ? window.api.formatDateDisplayDdMmYyyy(s.lastUpdate_date || "")
            : "") || (s.lastUpdate_date || "");
        document.getElementById("tableEditErr").classList.add("hidden");
        document.getElementById("tableEditOk").classList.add("hidden");
        var panel = document.getElementById("tableEditPanel");
        if (panel) {
          panel.classList.remove("hidden");
          try {
            panel.scrollIntoView({ behavior: "smooth", block: "nearest" });
          } catch (se) {
            /* ignore */
          }
        }
      }

      function renderStudentTableFromApi(students) {
        var headRow = document.getElementById("fullCsvHeadRow");
        var tb = document.getElementById("fullCsvBody");
        if (!headRow || !tb) {
          return;
        }
        if (!students || !students.length) {
          headRow.innerHTML =
            '<th class="py-2 pr-3 font-medium text-[#4a3410]">—</th>';
          tb.innerHTML =
            '<tr><td class="py-4 text-[#5c4033]">No students in list yet.</td></tr>';
          return;
        }
        headRow.innerHTML =
          '<th class="py-2 pr-3 font-medium text-[#4a3410] whitespace-nowrap min-w-[9.5rem]">Actions</th>' +
          STUDENT_TABLE_COLS.map(function (col) {
            return (
              '<th class="py-2 pr-3 font-medium text-[#4a3410] whitespace-nowrap max-w-[14rem]">' +
              escapeHtml(col.label) +
              "</th>"
            );
          }).join("");
        tb.innerHTML = students
          .map(function (s, idx) {
            var tds = STUDENT_TABLE_COLS.map(function (col) {
              var v = "";
              if (col.key === "club_name") {
                v =
                  (s.club_name != null && String(s.club_name).trim() !== ""
                    ? String(s.club_name).trim()
                    : "") ||
                  (typeof cachedManagerClubName === "string" &&
                  cachedManagerClubName.trim() !== ""
                    ? String(cachedManagerClubName).trim()
                    : "");
              } else if (s[col.key] != null) {
                v = String(s[col.key]);
              }
              var disp;
              if (col.key === "student_id") {
                disp =
                  window.api && typeof window.api.displayStudentIdForUi === "function"
                    ? window.api.displayStudentIdForUi(v)
                    : v;
              } else if (
                col.key === "date_of_birth" ||
                col.key === "joined_date" ||
                col.key === "creation_date" ||
                col.key === "lastUpdate_date"
              ) {
                disp =
                  window.api && typeof window.api.formatDateDisplayDdMmYyyy === "function"
                    ? window.api.formatDateDisplayDdMmYyyy(v)
                    : v;
              } else {
                disp = v;
              }
              return (
                '<td class="py-2 pr-3 text-xs align-top whitespace-pre-wrap break-words max-w-[16rem] text-[#3d2817]">' +
                escapeHtml(disp) +
                "</td>"
              );
            }).join("");
            var removeBtn =
              role === "CoachManager"

      function renderRawCsvFallback(csv) {
        var headRow = document.getElementById("fullCsvHeadRow");
        var tb = document.getElementById("fullCsvBody");
        if (!headRow || !tb) {
          return;
        }
        if (!csv || !csv.headers || !csv.headers.length) {
          headRow.innerHTML =
            '<th class="py-2 pr-3 font-medium text-[#4a3410]">—</th>';
          tb.innerHTML =
            '<tr><td class="py-4 text-[#5c4033]">No roster rows (empty or missing file).</td></tr>';
          return;
        }
        var colCount = csv.headers.length;
        headRow.innerHTML = csv.headers
          .map(function (h) {
            return (
              '<th class="py-2 pr-3 font-medium text-[#4a3410] whitespace-nowrap max-w-[14rem]">' +
              escapeHtml(h) +
              "</th>"
            );
          })
          .join("");
        if (!csv.rows || !csv.rows.length) {
          tb.innerHTML =
            '<tr><td colspan="' +
            colCount +
            '" class="py-4 text-[#5c4033]">Header only — no data rows yet.</td></tr>';
          return;
        }
        try {
          tb.innerHTML = csv.rows
            .map(function (row) {
              var cells = Array.isArray(row) ? row : [];
              return (
                '<tr class="border-b border-amber-900/10">' +
                cells
                  .map(function (cell, ci) {
                    var cStr = cell != null ? String(cell) : "";
                    var hdr =
                      csv.headers && csv.headers[ci] != null
                        ? String(csv.headers[ci]).trim().toLowerCase()
                        : "";
                    var isStudentIdCol =
                      hdr === "student_id" ||
                      hdr === "studentid" ||
                      hdr === "student id";
                    var disp;
                    if (isStudentIdCol) {
                      disp =
                        window.api &&
                        typeof window.api.displayStudentIdForUi === "function"
                          ? window.api.displayStudentIdForUi(cStr)
                          : cStr;
                    } else {
                      disp =
                        window.api &&
                        typeof window.api.formatDateDisplayDdMmYyyy === "function"
                          ? window.api.formatDateDisplayDdMmYyyy(cStr)
                          : cStr;
                    }
                    return (
                      '<td class="py-2 pr-3 text-xs align-top whitespace-pre-wrap break-words max-w-[16rem] text-[#3d2817]">' +
                      escapeHtml(disp) +
                      "</td>"
                    );
                  })
                  .join("") +
                "</tr>"
              );
            })
            .join("");
        } catch (renderErr) {
          tb.innerHTML =
            '<tr><td colspan="' +
            colCount +
            '" class="py-4 text-red-800">Could not render table: ' +
            escapeHtml(
              renderErr && renderErr.message ? renderErr.message : String(renderErr)
            ) +
            "</td></tr>";
        }
      }

      var loadFullCsvSeq = 0;
      var loadFullCsvAbort = null;

      function loadFullCsv(targetPage) {
        if (typeof targetPage === "number" && !isNaN(targetPage)) {
          studentListPage = Math.max(1, Math.floor(targetPage));
        }
        var errEl = document.getElementById("fullCsvError");
        var warnEl = document.getElementById("fullCsvWarn");
        hideAllStudentPanels();
        if (errEl) {
          errEl.classList.add("hidden");
        }
        if (warnEl) {
          warnEl.classList.add("hidden");
          warnEl.textContent = "";
        }

        if (!window.api || typeof window.api.api !== "function") {
          if (errEl) {
            errEl.textContent =
              "Scripts failed to load. Open Coach Manager from the running Node server (same origin as the API), not file:// or a static server that omits /js/api.js.";
            errEl.classList.remove("hidden");
          }
          cachedStudents = [];
          renderRawCsvFallback(null);
          return;
        }

        loadFullCsvSeq += 1;
        var mySeq = loadFullCsvSeq;
        if (loadFullCsvAbort) {
          try {
            loadFullCsvAbort.abort();
          } catch (abortErr) {
            /* ignore */
          }
        }
        loadFullCsvAbort =
          typeof AbortController !== "undefined" ? new AbortController() : null;
        var fetchOpts = loadFullCsvAbort ? { signal: loadFullCsvAbort.signal } : {};
        var path = "/coach-manager/students";
        if (useStudentPager) {
          path +=
            "?page=" +
            encodeURIComponent(String(studentListPage)) +
            "&limit=" +
            encodeURIComponent(String(STUDENT_LIST_PAGE_SIZE));
          if (!fetchOpts.signal) {
            fetchOpts.cacheTtlMs = 6000;
          }
        }

        window.api
          .api(path, fetchOpts)
          .then(function (data) {
            if (mySeq !== loadFullCsvSeq) {
              return;
            }
            if (!data || data.ok === false) {
              var failMsg =
                (data && data.error) || "Could not load student list (server returned an error).";
              if (errEl) {
                errEl.textContent = failMsg;
                errEl.classList.remove("hidden");
              }
              cachedStudents = [];
              renderRawCsvFallback(null);
              updateStudentPaginationUi();
              return;
            }
            if (data.clubId) {
              var prevCoachClub = lastCoachOptionsClubId;
              var newCid = String(data.clubId).trim();
              setUidLabels(newCid);
              cachedManagerClubFolderId = newCid;
              if (newCid !== prevCoachClub) {
                loadStudentCoachSelectOptions().catch(function () {});
              }
            }
            if (data.clubName && String(data.clubName).trim() !== "") {
              cachedManagerClubName = String(data.clubName).trim();
              setNewStudentClubNameField();
            }
            if (warnEl && data.studentsParseWarning) {
              warnEl.textContent =
                "Roster table shows raw columns; structured rows need valid student_id + full_name. " +
                data.studentsParseWarning;
              warnEl.classList.remove("hidden");
            }
            studentListTotal =
              typeof data.studentTotal === "number"
                ? data.studentTotal
                : Array.isArray(data.students)
                  ? data.students.length
                  : 0;
            cachedStudents = Array.isArray(data.students) ? data.students.slice() : [];
            updateStudentPaginationUi();
            try {
              if (cachedStudents.length > 0) {
                renderStudentTableFromApi(cachedStudents);
              } else {
                renderRawCsvFallback(data.studentCsv || null);
              }
            } catch (renderErr) {
              if (errEl) {
                errEl.textContent =
                  renderErr && renderErr.message
                    ? renderErr.message
                    : "Failed to render table.";
                errEl.classList.remove("hidden");
              }
              cachedStudents = [];
              renderRawCsvFallback(data.studentCsv || null);
            }
          })
          .catch(function (e) {
            if (mySeq !== loadFullCsvSeq) {
              return;
            }
            if (e && (e.name === "AbortError" || (e.cause && e.cause.name === "AbortError"))) {
              return;
            }
            var msg = e.message || "Could not load student roster.";
            if (e.status === 401 || /Unauthorized|Invalid token/i.test(msg)) {
              msg +=
                " Sign in as Coach or Coach Manager on the same host you used to open this site (do not mix localhost and 127.0.0.1).";
            }
            if (errEl) {
              errEl.textContent = msg;
              errEl.classList.remove("hidden");
            }
            cachedStudents = [];
            renderRawCsvFallback(null);
            updateStudentPaginationUi();
          });
      }

              }
              return;
            }
            if (pw !== pw2) {
              if (errEl) {
                errEl.textContent = "Passwords do not match.";
                errEl.classList.remove("hidden");
              }
              return;
            }
            if (pw.length < 6) {
              if (errEl) {
                errEl.textContent = "Password must be at least 6 characters.";
                errEl.classList.remove("hidden");
              }
              return;
            }
            okBtn.disabled = true;
            window.api
              .api("/coach-manager/students/role-login-account", {
                method: "POST",
                body: JSON.stringify({
                  fullName: fullName,
                  username: username,
                  password: pw,
                  passwordConfirm: pw2,
                }),
              })
              .then(function (data) {
                var uid = data.uid != null ? String(data.uid) : "";
                var cid = data.clubId != null ? String(data.clubId) : "";
                var cname = data.clubName != null ? String(data.clubName) : "";
                var parts = [data.message || "Created."];
                if (uid) {
                  parts.push("Login UID: " + uid + ".");
                }
                if (cid || cname) {
                  parts.push("Club: " + (cid || "—") + (cname ? " (" + cname + ")" : "") + ".");
                }
                invalidateStudentListCache();
                loadFullCsv(studentListPage);
                closeNewStudentRoleAccountModal();
                openLoginAccountSuccessModal(parts.join("\n"));
              })
              .catch(function (e) {
                if (errEl) {
                  errEl.textContent = e.message || "Could not create account.";
                  errEl.classList.remove("hidden");
                }
              })
              .finally(function () {
                okBtn.disabled = false;
              });
          });
      }

      (function bindStudentPager() {
        var prev = document.getElementById("studentPagerPrev");
        var next = document.getElementById("studentPagerNext");
        if (prev) {
          prev.addEventListener("click", function () {
            if (studentListPage > 1) {
              invalidateStudentListCache();
              loadFullCsv(studentListPage - 1);
            }
          });
        }
        if (next) {
          next.addEventListener("click", function () {
            var pages = Math.max(
              1,
              Math.ceil(studentListTotal / STUDENT_LIST_PAGE_SIZE)
            );
            if (studentListPage < pages) {
              invalidateStudentListCache();
              loadFullCsv(studentListPage + 1);
            }
          });
        }
      })();
    })();
  </script>
</body>
</html>
