<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ClubMaster - Student</title>
  <link rel="stylesheet" href="css/dashboard-metal-nav.css" />
  <link rel="stylesheet" href="css/overview-stage-photo.css" />
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }
    html {
      height: 100%;
      height: -webkit-fill-available;
    }
    body.student-page {
      margin: 0;
      display: flex;
      flex-direction: column;
      min-height: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      min-height: -webkit-fill-available;
      background: #0a0a0a;
      color: #e2e8f0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      overflow-x: hidden;
    }
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
    .hidden {
      display: none !important;
    }

    .cm-role-heading {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 700;
      line-height: 1.25;
    }
    @media (min-width: 640px) {
      .cm-role-heading {
        font-size: 1.35rem;
      }
    }
    .cm-role-shimmer {
      display: inline-block;
      font-weight: 700;
      background: linear-gradient(
        100deg,
        #ffffff 0%,
        #fefdfb 6%,
        #faf3e0 14%,
        #f3e4c4 22%,
        #e8b86a 30%,
        #e5983a 38%,
        #daa520 46%,
        #f0c419 52%,
        #facc15 58%,
        #fde047 64%,
        #fef08a 70%,
        #fde047 76%,
        #f5e6c8 84%,
        #faf3e0 92%,
        #ffffff 100%
      );
      background-size: 300% 100%;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      -webkit-text-fill-color: transparent;
      animation: cm-role-gold-shift 56s ease-in-out infinite alternate;
    }
    @keyframes cm-role-gold-shift {
      0% {
        background-position: 0% 50%;
      }
      100% {
        background-position: 100% 50%;
      }
    }
    @media (prefers-reduced-motion: reduce) {
      .cm-role-shimmer {
        animation: none;
        background: none;
        color: #e8c547;
        -webkit-text-fill-color: #e8c547;
      }
    }

    .cm-top-frame {
      flex: 0 0 auto;
      background: linear-gradient(180deg, #141210 0%, #0c0b0a 100%);
      border-bottom: 1px solid rgba(212, 175, 55, 0.28);
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.55);
    }
    .cm-top-frame__row {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem 1rem;
      padding: 0.65rem 0.85rem 0.45rem;
      max-width: 72rem;
      margin: 0 auto;
    }
    #welcome {
      margin: 0.2rem 0 0;
      font-size: 0.75rem;
      color: #94a3b8;
      max-width: 70vw;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    @media (min-width: 640px) {
      #welcome {
        font-size: 0.8125rem;
      }
    }
    #logoutBtn {
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0.45rem 0.75rem;
      border-radius: 0.4rem;
      color: #fef3c7;
      border: 1px solid rgba(180, 83, 9, 0.45);
      background: linear-gradient(165deg, #292524 0%, #0c0a09 100%);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
    }
    #logoutBtn:hover {
      border-color: rgba(251, 191, 36, 0.55);
      background: linear-gradient(165deg, #3f3a36 0%, #12100e 100%);
    }

    .cm-main-stage {
      flex: 1 1 auto;
      min-height: 0;
      display: flex;
      flex-direction: column;
      padding: 0.5rem 0.65rem 0.65rem;
      max-width: 72rem;
      margin: 0 auto;
      width: 100%;
    }
    .cm-middle-frame {
      flex: 1 1 auto;
      min-height: 0;
      position: relative;
      overflow: hidden;
      border-radius: 0.65rem;
      border: 1px solid rgba(212, 175, 55, 0.38);
      background: #000;
      box-shadow:
        inset 0 1px 0 rgba(255, 248, 220, 0.08),
        inset 0 0 0 1px rgba(0, 0, 0, 0.5),
        0 16px 48px rgba(0, 0, 0, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0.2rem;
    }
    .cm-image-stage {
      flex: 1 1 auto;
      min-height: 0;
      min-width: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cm-image-pin {
      position: relative;
      align-self: center;
      max-width: 100%;
      max-height: 100%;
      line-height: 0;
      /*
       * student.webp native size: 1400×781 px. Tiles = 2 columns × 3 rows.
       * Pixel box (top-left, w×h) from layout read, scaled to 1400×781:
       * Coach (294,281) 383×129 | My booking (294,430) | Payment (294,579)
       * Browse (704,281) | Attendee (704,430) | Upcoming (704,579)
       * Centre (x,y) px: (485,346), (485,495), (485,644), (896,346), (896,495), (896,644)
       */
      --student-hit-w: 27.34%;
      --student-hit-h: 16.47%;
      --student-col-L: 21%;
      --student-col-R: 50.29%;
      --student-row-1: 36.02%;
      --student-row-2: 55.08%;
      --student-row-3: 74.15%;
    }
    .cm-middle-frame__photo {
      display: block;
      max-width: 100%;
      max-height: 100%;
      width: auto;
      height: auto;
      object-fit: contain;
      object-position: center top;
      pointer-events: none;
      user-select: none;
      -webkit-user-select: none;
    }

    /** Six hits over student.webp: left column (3 rows) then right column (3 rows). */
    .cm-student-tiles {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      z-index: 1;
      pointer-events: none;
    }
    .cm-student-tiles > a.cm-hotspot {
      position: absolute;
      pointer-events: auto;
      box-sizing: border-box;
      /*
       * Baseline: −80px on Y vs %-`top`, then +15px down for everyone.
       * My booking + Attendee: also +5px right (Coach/Browse use override below).
       */
      transform: translate(5px, calc(-80px + 15px));
    }
    /* Coach Details + Browse Lessons: keep extra 15px up vs −80, then same +15px global down */
    .cm-student-tiles > a.cm-hotspot.cm-student-tiles__nudge-coach-browse {
      transform: translate(5px, -80px);
    }
    /* Payment + Upcoming: −80 + 20px relax, then +15px global down, +5px right */
    .cm-student-tiles > a.cm-hotspot.cm-student-tiles__nudge-down20 {
      transform: translate(5px, calc(-80px + 20px + 15px));
    }

    a.cm-hotspot {
      position: absolute;
      border-radius: 0.5rem;
      transition: background-color 0.2s ease;
      text-decoration: none;
    }
    a.cm-hotspot:hover {
      background: rgba(255, 255, 255, 0.08);
    }
    a.cm-hotspot:focus-visible {
      outline: 2px solid rgba(212, 175, 55, 0.65);
      outline-offset: 2px;
    }

    .cm-iframe-panel {
      flex: 1 1 auto;
      min-height: 0;
      width: 100%;
      border: 0;
      border-radius: 0.65rem;
      background: rgba(15, 23, 42, 0.92);
    }
  </style>
</head>
<body
  class="student-page"
  data-dashboard-nav-active="cm-metal-btn-active">
  <span id="clubDock" class="sr-only" aria-hidden="true"></span>

  <header class="cm-top-frame">
    <div class="cm-top-frame__row">
      <div>
        <h1 class="cm-role-heading"><span id="cmRoleLabel" class="cm-role-shimmer">Student</span></h1>
        <p id="welcome">Loading…</p>
      </div>
      <button type="button" id="logoutBtn">Sign out</button>
    </div>
    <nav class="cm-metal-panel" aria-label="Dashboard sections">
      <div class="cm-metal-panel__inner">
        <button type="button" id="navOverview" class="cm-metal-btn">Overview</button>
        <button type="button" id="navProfile" class="cm-metal-btn">My Profile</button>
        <button type="button" id="navSettings" class="cm-metal-btn">Password Change</button>
      </div>
    </nav>
  </header>

  <main class="cm-main-stage">
    <div id="panelOverview" class="cm-middle-frame" aria-label="Student shortcuts">
      <div class="cm-image-stage">
        <div class="cm-image-pin">
          <div
            class="cm-middle-frame__photo cm-overview-bg-lazy"
            role="img"
            aria-label="Student overview"
            data-overview-bg="source/image/student.webp"></div>
          <div class="cm-student-tiles">
            <a class="cm-hotspot cm-student-tiles__nudge-coach-browse" href="#" data-dashboard-iframe="backend/coach_manager_modules/coach_information/coach-information.html"
              title="Coach Details" aria-label="Coach Details"
              style="left: var(--student-col-L); top: var(--student-row-1); width: var(--student-hit-w); height: var(--student-hit-h);"></a>
            <a class="cm-hotspot" href="#" data-dashboard-iframe="backend/lesson_modules/lesson_browse/student-my-bookings.html"
              title="My booking" aria-label="My booking"
              style="left: var(--student-col-L); top: var(--student-row-2); width: var(--student-hit-w); height: var(--student-hit-h);"></a>
            <a class="cm-hotspot cm-student-tiles__nudge-down20" href="#" data-dashboard-iframe="backend/payment_modules/student_payment/student-payment.html"
              title="Payment" aria-label="Payment"
              style="left: var(--student-col-L); top: var(--student-row-3); width: var(--student-hit-w); height: var(--student-hit-h);"></a>
            <a class="cm-hotspot cm-student-tiles__nudge-coach-browse" href="#" data-dashboard-iframe="backend/lesson_modules/lesson_browse/lesson-browse.html"
              title="Browse Lessons" aria-label="Browse Lessons"
              style="left: var(--student-col-R); top: var(--student-row-1); width: var(--student-hit-w); height: var(--student-hit-h);"></a>
            <a class="cm-hotspot" href="#" data-dashboard-iframe="backend/lesson_modules/lesson_browse/lesson-attendee.html"
              title="Attendee Record" aria-label="Attendee Record"
              style="left: var(--student-col-R); top: var(--student-row-2); width: var(--student-hit-w); height: var(--student-hit-h);"></a>
            <a class="cm-hotspot cm-student-tiles__nudge-down20" href="coming_soon.html?m=student-upcoming-events"
              title="Upcoming Events" aria-label="Upcoming Events"
              style="left: var(--student-col-R); top: var(--student-row-3); width: var(--student-hit-w); height: var(--student-hit-h);"></a>
          </div>
        </div>
      </div>
    </div>
    <iframe id="panelFrame" title="Dashboard panel" class="cm-iframe-panel hidden"></iframe>
  </main>

  <script src="js/overview-lazy-bg.js"></script>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard-common.js"></script>
  <script src="js/dashboard-layout.js"></script>
  <script src="js/student.js"></script>
</body>
</html>
