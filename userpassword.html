<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change password</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="min-h-full bg-slate-900/90 text-slate-100 p-6">
  <div class="glass rounded-xl border border-white/15 p-6 max-w-md">
    <h2 class="text-lg font-semibold text-teal-300 mb-4">Password change</h2>
    <form id="pwdForm" class="space-y-4">
      <div>
        <label class="block text-xs text-slate-400 mb-1">Old Password</label>
        <input type="password" id="oldPassword" required autocomplete="current-password"
          class="w-full rounded-lg bg-slate-900 border border-slate-600 px-3 py-2 text-white" />
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-1">New Password</label>
        <input type="password" id="newPassword" required autocomplete="new-password"
          class="w-full rounded-lg bg-slate-900 border border-slate-600 px-3 py-2 text-white" />
      </div>
      <div>
        <label class="block text-xs text-slate-400 mb-1">Enter New Password</label>
        <input type="password" id="newPasswordAgain" required autocomplete="new-password"
          class="w-full rounded-lg bg-slate-900 border border-slate-600 px-3 py-2 text-white" />
      </div>
      <div class="flex flex-wrap gap-3 pt-2">
        <button type="submit"
          class="rounded-xl bg-teal-600 hover:bg-teal-500 px-5 py-2 font-medium text-white">
          Confirm
        </button>
        <button type="button" id="btnReturn"
          class="rounded-xl bg-slate-700 hover:bg-slate-600 border border-slate-500 px-5 py-2 font-medium">
          Return
        </button>
      </div>
    </form>
    <p id="formMsg" class="text-sm mt-3 min-h-[1.25rem]"></p>
  </div>
  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script>
    (function () {
      if (!window.auth.getToken()) {
        window.location.href = "main.html";
        return;
      }

      function goBackToOverview() {
        if (window.parent && window.parent !== window) {
          var btn = window.parent.document.getElementById("navOverview");
          if (btn) {
            btn.click();
            return;
          }
        }
        window.history.back();
      }

      document.getElementById("btnReturn").addEventListener("click", goBackToOverview);

      document.getElementById("pwdForm").addEventListener("submit", async function (e) {
        e.preventDefault();
        var msg = document.getElementById("formMsg");
        msg.textContent = "";
        msg.className = "text-sm mt-3 min-h-[1.25rem]";

        var oldP = document.getElementById("oldPassword").value;
        var newP = document.getElementById("newPassword").value;
        var newP2 = document.getElementById("newPasswordAgain").value;

        if (newP !== newP2) {
          msg.textContent = "New Password and Enter New Password do not match.";
          msg.classList.add("text-red-300");
          window.alert(msg.textContent);
          return;
        }

        try {
          await window.api.api("/me/password", {
            method: "POST",
            body: JSON.stringify({
              oldPassword: oldP,
              newPassword: newP,
            }),
          });
          msg.textContent = "Password updated successfully.";
          msg.classList.add("text-emerald-300");
          window.alert("Password updated successfully.");
          document.getElementById("oldPassword").value = "";
          document.getElementById("newPassword").value = "";
          document.getElementById("newPasswordAgain").value = "";
          goBackToOverview();
        } catch (err) {
          var t = err.message || "Password change failed.";
          msg.textContent = t;
          msg.classList.add("text-red-300");
          window.alert(t);
        }
      });
    })();
  </script>
</body>
</html>
